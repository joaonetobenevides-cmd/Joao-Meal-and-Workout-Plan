<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Joao's Plan</title>
  <meta name="description" content="4-week meal + training reference">
  <meta name="theme-color" content="#f5ead8">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Joao's Plan">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone">
    <div id="header"></div>
    <div class="content" id="content"></div>
    <div class="tabbar">
      <button class="tab-btn" data-action="set-tab" data-tab="week">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"></rect><path d="M8 3v4M16 3v4M3 10h18"></path></svg>
        <span>Week</span>
      </button>
      <button class="tab-btn" data-action="set-tab" data-tab="reference">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5v-17Z"></path><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path></svg>
        <span>Reference</span>
      </button>
      <button class="tab-btn" data-action="set-tab" data-tab="progress">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-9"></path><path d="M15 6h6v6"></path></svg>
        <span>Progress</span>
      </button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
